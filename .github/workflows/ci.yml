name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate-frontmatter:
    name: Validate Skill Frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run validator
        run: bash scripts/validate-frontmatter.sh

  changelog:
    name: Changelog Required
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md updated
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md updated"
          else
            echo "::error::CHANGELOG.md must be updated in every PR. Run scripts/changelog-add.sh \"<entry>\" then commit."
            exit 1
          fi

      - name: Check entry under [Unreleased]
        run: |
          if ! awk '/^## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md | grep -qE '^- '; then
            echo "::error::CHANGELOG.md has no entries under [Unreleased]. Add at least one bullet."
            exit 1
          fi
